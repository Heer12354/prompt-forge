<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prompt Forge</title>
    <style>
      :root {
        color: #15201d;
        background: #fbfcfa;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        box-sizing: border-box;
        width: 320px;
        margin: 0;
        padding: 14px;
        animation: popup-enter 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      h1 {
        margin: 0 0 12px;
        font: 750 18px/1.2 Inter, ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0;
      }

      form, .section {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      [hidden] {
        display: none !important;
      }

      label {
        display: grid;
        gap: 5px;
        color: #52615c;
        font: 650 12px/1.25 Inter, ui-sans-serif, system-ui, sans-serif;
      }

      input, select {
        box-sizing: border-box;
        width: 100%;
        min-height: 34px;
        border: 1px solid rgba(21, 32, 29, 0.18);
        border-radius: 6px;
        padding: 0 9px;
        background: #ffffff;
        color: #15201d;
        font: 400 12px/1 Inter, ui-sans-serif, system-ui, sans-serif;
        transition: border-color 160ms ease, box-shadow 160ms ease;
      }

      input:focus, select:focus {
        border-color: rgba(31, 122, 93, 0.54);
        box-shadow: 0 0 0 3px rgba(31, 122, 93, 0.12);
        outline: none;
      }

      button {
        min-height: 34px;
        border: 1px solid rgba(21, 32, 29, 0.14);
        border-radius: 6px;
        background: #ffffff;
        color: #15201d;
        cursor: pointer;
        font: 700 12px/1 Inter, ui-sans-serif, system-ui, sans-serif;
        position: relative;
        overflow: hidden;
        transition:
          background 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease,
          color 160ms ease,
          transform 160ms ease;
      }

      button:hover {
        background: #eef4ef;
        box-shadow: 0 8px 18px rgba(21, 32, 29, 0.08);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button.primary {
        border-color: #1f7a5d;
        background: linear-gradient(135deg, #1f7a5d, #258866);
        color: #ffffff;
        box-shadow: 0 10px 24px rgba(31, 122, 93, 0.20);
      }

      button.primary::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.28) 45%, transparent 70%);
        opacity: 0;
        transform: translateX(-120%);
      }

      button.primary:hover::after {
        animation: button-sheen 760ms ease;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stat {
        border: 1px solid rgba(21, 32, 29, 0.12);
        border-radius: 6px;
        padding: 8px;
        background:
          linear-gradient(135deg, rgba(31, 122, 93, 0.08), rgba(80, 85, 174, 0.06)),
          #f4f7f2;
        transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      }

      .stat:hover {
        border-color: rgba(31, 122, 93, 0.20);
        box-shadow: 0 8px 18px rgba(21, 32, 29, 0.06);
      }

      .stat span {
        display: block;
        color: #52615c;
        font: 650 11px/1.2 Inter, ui-sans-serif, system-ui, sans-serif;
      }

      .stat strong {
        display: block;
        margin-top: 4px;
        font: 750 18px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      }

      .status {
        min-height: 16px;
        color: #52615c;
        font: 400 12px/1.3 Inter, ui-sans-serif, system-ui, sans-serif;
      }

      .error {
        color: #9c2d1f;
      }

      @keyframes popup-enter {
        from {
          opacity: 0;
          transform: translateY(5px) scale(0.99);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes button-sheen {
        0% {
          opacity: 0;
          transform: translateX(-120%);
        }

        35% {
          opacity: 1;
        }

        100% {
          opacity: 0;
          transform: translateX(120%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body,
        button.primary:hover::after {
          animation: none;
        }

        input,
        select,
        button,
        .stat {
          transition: none;
        }

        button:hover {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <h1>Prompt Forge</h1>
    <div class="stats">
      <div class="stat">
        <span>Saved</span>
        <strong id="saved-count">0</strong>
      </div>
      <div class="stat">
        <span>API key</span>
        <strong id="api-key-state">No</strong>
      </div>
    </div>

    <form id="settings-form">
      <label>
        AI provider
        <select id="provider">
          <option value="nvidia">NVIDIA</option>
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="gemini">Google Gemini</option>
          <option value="openrouter">OpenRouter</option>
          <option value="custom">Custom OpenAI-compatible</option>
        </select>
      </label>
      <label>
        Model
        <input id="model" type="text" autocomplete="off" placeholder="Model name">
      </label>
      <label id="endpoint-row" hidden>
        Custom endpoint
        <input id="endpoint" type="url" autocomplete="off" placeholder="https://api.example.com/v1/chat/completions">
      </label>
      <label>
        Mode
        <select id="mode">
          <option value="feedback">Coach only</option>
          <option value="rewrite">Refine + coach</option>
        </select>
      </label>
      <label>
        API key
        <input id="api-key" type="password" autocomplete="off" placeholder="Paste provider API key">
      </label>
      <button class="primary" type="submit">Save Settings</button>
    </form>

    <div class="section">
      <button type="button" id="open-side-panel">Open Prompt Panel</button>
      <div class="status" id="status" role="status"></div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
